name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup markdownlint
        run: npm install -g markdownlint-cli2

      - name: Run unit checks
        run: bash scripts/ci-check.sh

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Start databases
        run: docker compose up -d postgres mysql

      - name: Wait for databases
        run: |
          for _ in $(seq 1 60); do
            pg="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' sqio-postgres-1)"
            my="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' sqio-mysql-1)"
            echo "postgres=${pg} mysql=${my}"
            if [[ "$pg" == "healthy" && "$my" == "healthy" ]]; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          exit 1

      - name: Run database smoke tests
        run: bash scripts/smoke-db.sh

      - name: Stop databases
        if: always()
        run: docker compose down
