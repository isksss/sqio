name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            ext: ""
          - goos: darwin
            goarch: arm64
            runner: macos-15
            ext: ""
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: ""
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          target="sqio_${version}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${target}"
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/${target}/sqio${{ matrix.ext }}" \
            ./cmd/sqio
          cd dist
          tar -czf "${target}.tar.gz" "${target}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: sqio_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
