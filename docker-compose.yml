services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: sqio
      POSTGRES_USER: sqio
      POSTGRES_PASSWORD: sqio
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sqio -d sqio"]
      interval: 2s
      timeout: 2s
      retries: 30

  mysql:
    image: mysql:9.5
    environment:
      MYSQL_DATABASE: sqio
      MYSQL_USER: sqio
      MYSQL_PASSWORD: sqio
      MYSQL_ROOT_PASSWORD: sqio-root
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -usqio -psqio --silent"]
      interval: 2s
      timeout: 2s
      retries: 60

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: SqioStrong!2026
    ports:
      - "11433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"select 1\" >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 60

  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    environment:
      ORACLE_PASSWORD: SqioOracle!2026
      APP_USER: sqio
      APP_USER_PASSWORD: sqio
    ports:
      - "11521:1521"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 90

  clickhouse:
    image: clickhouse:lts
    environment:
      CLICKHOUSE_DB: sqio
      CLICKHOUSE_USER: sqio
      CLICKHOUSE_PASSWORD: sqio
    ports:
      - "18123:8123"
      - "19000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user sqio --password sqio --query 'select 1' >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 60

  ssh:
    image: lscr.io/linuxserver/openssh-server:latest
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Etc/UTC
      PASSWORD_ACCESS: "true"
      USER_NAME: sqio
      USER_PASSWORD: sqio-ssh
      LOG_STDOUT: "true"
    volumes:
      - ./docker/ssh/10-enable-forwarding:/custom-cont-init.d/10-enable-forwarding:ro
    ports:
      - "12222:2222"

  sqio-test:
    build:
      context: .
      dockerfile: docker/test/Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - sqio-go-cache:/go/pkg/mod
      - sqio-build-cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
      oracle:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      ssh:
        condition: service_started
    profiles:
      - test

volumes:
  sqio-go-cache:
  sqio-build-cache:
